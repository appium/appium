name: Appium Server Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no publishing or tagging)'
        required: true
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && contains(fromJSON('["mykola-mokhnach", "jlipps", "eglitise", "KazuCocoa"]'), github.actor)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git user
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Setup Node and install deps (LTS)
        uses: ./.github/actions/setup-build
        with:
          node-version: lts/*
          install-command: npm ci
          run-build: 'true'

      - name: Run Lerna publish
        env:
          # for lerna createRelease
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail
          if [ "$DRY_RUN" = "true" ]; then
            echo "Running lerna publish in dry-run mode"
            printf "n\n" | npx lerna version --exact --no-git-tag-version --no-push
          else
            echo "Running lerna publish for real"
            set +e
            release_output="$(npm run release -- --yes 2>&1)"
            release_exit_code=$?
            set -e
            printf '%s\n' "$release_output"

            if [ $release_exit_code -eq 0 ]; then
              exit 0
            fi

            if [[ "$release_output" == *"fatal: tag '"*"' already exists"* ]]; then
              echo "Detected existing tag failure; attempting publish recovery from tags"
              npx lerna publish from-git --yes
            else
              echo "Release failed and no known recovery condition matched"
              exit $release_exit_code
            fi
          fi

